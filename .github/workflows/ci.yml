name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          OPENROUTER_API_KEY: test
          OPENROUTER_AI_MODEL: test-model
          DATABASE_URL: sqlite:///test.db
        run: uv run python -m pytest tests/ -v

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Biome check
        run: pnpm exec biome ci .

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

  docker:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-test
      OPENROUTER_API_KEY: ci-test-dummy-key
      OPENROUTER_AI_MODEL: test-model
      NEXTAUTH_SECRET: ci-test-dummy-secret
      NEXTAUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images
        run: docker compose build

      - name: Scan backend image with Trivy
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest \
            image --severity CRITICAL,HIGH --exit-code 0 --ignore-unfixed \
            ai-math-backend:ci

      - name: Scan frontend image with Trivy
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest \
            image --severity CRITICAL,HIGH --exit-code 0 --ignore-unfixed \
            ai-math-frontend:ci

      - name: Start services
        if: github.event_name == 'push'
        run: docker compose up -d

      - name: Wait for DB
        if: github.event_name == 'push'
        run: docker compose wait db

      - name: Wait for backend health
        if: github.event_name == 'push'
        run: |
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8001/health; then
              echo "Backend is healthy"
              exit 0
            fi
            echo "Waiting for backend... ($i/10)"
            sleep 3
          done
          echo "Backend failed to start"
          docker compose logs backend
          exit 1

      - name: Check frontend
        if: github.event_name == 'push'
        run: |
          for i in $(seq 1 10); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000)
            if [ "$status" = "200" ]; then
              echo "Frontend is up (HTTP 200)"
              exit 0
            fi
            echo "Waiting for frontend... ($i/10, status=$status)"
            sleep 3
          done
          echo "Frontend failed to start"
          docker compose logs frontend
          exit 1

      - name: Cleanup
        if: always()
        run: docker compose down -v
